[package]
name = "rusty-stack"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rusty-stack"
path = "src/main.rs"

[[bin]]
name = "rusty-stack-bench"
path = "src/bin/benchmark_runner.rs"

[[bin]]
name = "rusty-stack-update"
path = "src/bin/update.rs"

[[bin]]
name = "rusty-stack-upgrade"
path = "src/bin/upgrade.rs"

[dependencies]
anyhow = "1.0"
chrono = "0.4"
crossterm = "0.27"
libc = "0.2"
ratatui = "0.26"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sysinfo = "0.30"
dirs = "5"
clap = { version = "4", features = ["derive"] }
regex = "1"
sha2 = "0.10"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "time"] }

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
