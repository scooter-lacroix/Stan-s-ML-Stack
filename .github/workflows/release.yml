name: Release

on:
  push:
    branches: [main]
    paths:
      # Only trigger when version-carrying files change (bumped by bump-version.yml or manual edit)
      - 'rusty-stack/Cargo.toml'
      - 'VERSION'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Verify version parity across published surfaces ────────────────
  version-parity:
    name: Verify published-surface versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml / pyproject.toml versions match
        run: |
          set -e
          CARGO_VER=$(grep -m1 '^version' rusty-stack/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          PYPI_VER=$(
            python3 - <<'PY'
import tomllib
data = tomllib.load(open("pyproject.toml", "rb"))
project = data.get("project", {})
explicit = project.get("version")
if explicit:
    print(explicit)
PY
          )
          # pyproject.toml uses dynamic version from VERSION file when explicit version is absent.
          if [ -z "$PYPI_VER" ] || [ "$PYPI_VER" = "None" ] || [ "$PYPI_VER" = "MISSING" ]; then
            if [ -f "VERSION" ]; then
              PYPI_VER=$(cat VERSION)
            else
              PYPI_VER="MISSING"
            fi
          fi
          echo "Cargo: ${CARGO_VER}  PyPI (pyproject.toml/VERSION): ${PYPI_VER}"
          if [ "$CARGO_VER" != "$PYPI_VER" ]; then
            echo "ERROR: Version mismatch! Cargo=$CARGO_VER PyPI=$PYPI_VER"
            exit 1
          fi
          echo "All versions match: ${CARGO_VER}"

  # ── Detect version bump ──────────────────────────────────────────────
  detect:
    name: Detect version change
    needs: [version-parity]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      changed: ${{ steps.ver.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for tag listing and changelog

      - name: Extract version from Cargo.toml
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version =' rusty-stack/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Fetch all tags explicitly (ensures tag list is accurate)
          git fetch --tags

          # Check if a published (non-draft) release for this version already exists
          if gh release view "v${VERSION}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q false; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Published release v${VERSION} already exists — skipping"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New version or draft-only: v${VERSION}"
          fi

  # ── Build native binaries ────────────────────────────────────────────
  build:
    name: Build ${{ matrix.asset_name }}
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: linux-x86_64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: windows-x86_64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rusty-stack

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rusty-stack/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('rusty-stack/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binaries (Linux only)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/rusty-stack
          strip target/${{ matrix.target }}/release/rusty || true

      - name: Package release bundle
        shell: bash
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          EXT="${{ matrix.asset_name == 'windows-x86_64' && '.exe' || '' }}"
          BUNDLE_DIR="rusty-stack-${VERSION}-${{ matrix.asset_name }}"
          mkdir -p "$BUNDLE_DIR/bin"

          # Copy both binaries
          cp "target/${{ matrix.target }}/release/rusty-stack${EXT}" "$BUNDLE_DIR/bin/rusty-stack${EXT}"
          cp "target/${{ matrix.target }}/release/rusty${EXT}" "$BUNDLE_DIR/bin/rusty${EXT}" || true

          # Create archive
          if [ "${{ matrix.asset_name }}" = "windows-x86_64" ]; then
            7z a -tzip "${BUNDLE_DIR}.zip" "$BUNDLE_DIR"
          else
            tar czf "${BUNDLE_DIR}.tar.gz" "$BUNDLE_DIR"
          fi
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.asset_name }}
          path: |
            rusty-stack/rusty-stack-*.tar.gz
            rusty-stack/rusty-stack-*.zip
          if-no-files-found: error

  # ── Create GitHub Release (draft) ────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [detect, build]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: release-artifacts
        run: |
          shopt -s nullglob
          sha256sum rusty-stack-*.tar.gz rusty-stack-*.zip > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | awk -v current="v${VERSION}" '$0 != current { print; exit }')

          {
            echo "## What's Changed"
            echo ""
            echo "## Install"
            echo ""
            echo "Rusty Stack is now published as the \`rusty-stack\` crates.io package:"
            echo ""
            echo "\`\`\`bash"
            echo "cargo install rusty-stack --locked"
            echo "rusty"
            echo "\`\`\`"
            echo ""
            echo "The PyPI package is a compatibility wrapper that installs the same crates.io binary."
            echo ""
            echo "Rusty Llama remains installed only through Rusty Stack:"
            echo ""
            echo "\`\`\`bash"
            echo "rusty update llama-cpp"
            echo "\`\`\`"
            echo ""
            echo "**Windows support is in ALPHA testing. We are openly accepting testers! The easiest way to become a tester is to test on your system/hardware, and when issues are encountered, open an issue following the issue template.**"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "Changes since ${PREV_TAG}:"
              echo ""
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}"
            else
              echo "Initial release."
            fi
          } > CHANGELOG.md

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ needs.detect.outputs.version }}
          body_path: CHANGELOG.md
          draft: true
          prerelease: false
          files: |
            release-artifacts/rusty-stack-*.tar.gz
            release-artifacts/rusty-stack-*.zip
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io ─────────────────────────────────────────────
  crates-io:
    name: Publish crates.io
    needs: [detect, github-release]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rusty-stack
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: publish-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish to crates.io
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          # Skip if this version already exists on crates.io (idempotent for retries)
          # Retry up to 3 times on transient errors (5xx, timeouts, network/DNS failures)
          HTTP_STATUS="000"
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -sS -o /tmp/crates_resp -w "%{http_code}" "https://crates.io/api/v1/crates/rusty-stack" 2>/dev/null) || HTTP_STATUS="000"
            echo "crates.io lookup attempt ${i}: HTTP ${HTTP_STATUS}"
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "404" ]; then
              break
            fi
            if [ "$HTTP_STATUS" != "000" ] && [ "$HTTP_STATUS" -lt 500 ] 2>/dev/null; then
              # Non-transient client error (e.g. 403 rate limit) — don't retry
              break
            fi
            if [ "$i" -lt 3 ]; then
              echo "Transient error, retrying in $((i * 10))s..."
              sleep $((i * 10))
            fi
          done
          if [ "$HTTP_STATUS" = "200" ]; then
            PUBLISHED=$(python3 -c "import sys,json; d=json.load(open('/tmp/crates_resp')); print(d.get('crate',{}).get('max_stable_version',''))" 2>/dev/null || echo "")
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "Version ${VERSION} already published to crates.io — skipping"
            else
              echo "Version ${VERSION} not yet published (latest: ${PUBLISHED}), publishing"
              cargo publish --locked
            fi
          elif [ "$HTTP_STATUS" = "404" ]; then
            echo "Crate not found on crates.io (404) — first-time publish"
            cargo publish --locked
          else
            echo "::error::crates.io returned HTTP ${HTTP_STATUS} after 3 attempts — aborting (possible rate limit or outage)"
            cat /tmp/crates_resp 2>/dev/null || true
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish PyPI package (thin wrapper) ──────────────────────────────
  pypi:
    name: Publish PyPI
    needs: [detect, github-release, crates-io]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify version parity
        run: |
          CARGO_VERSION=$(grep '^version =' rusty-stack/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PYPI_VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project'].get('version',''))" 2>/dev/null || true)
          if [ -z "$PYPI_VERSION" ] || [ "$PYPI_VERSION" = "None" ] || [ "$PYPI_VERSION" = "MISSING" ]; then
            if [ -f "VERSION" ]; then
            PYPI_VERSION=$(cat VERSION)
            else
              PYPI_VERSION="MISSING"
            fi
          fi
          if [ "$CARGO_VERSION" != "$PYPI_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, pyproject.toml/VERSION=$PYPI_VERSION"
            exit 1
          fi
          echo "Versions match: v${CARGO_VERSION}"

      - name: Install Python build frontend
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Final summary ────────────────────────────────────────────────────
  summary:
    name: Release Summary
    needs: [detect, github-release, crates-io, pypi]
    if: always() && needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify HEAD matches release commit
        if: needs.github-release.result == 'success'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          RELEASE_SHA=$(gh release view "v${VERSION}" --json targetCommitish --jq '.targetCommitish')
          BRANCH_HEAD_SHA=$(git ls-remote origin "refs/heads/${GITHUB_REF_NAME}" | awk '{print $1}')
          if [ "$RELEASE_SHA" != "$BRANCH_HEAD_SHA" ]; then
            echo "ERROR: Release SHA ($RELEASE_SHA) != ${GITHUB_REF_NAME} HEAD ($BRANCH_HEAD_SHA)"
            echo "New commits landed during release — aborting undraft."
            exit 1
          fi
          echo "SHA verified: $BRANCH_HEAD_SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish draft release
        if: needs.github-release.result == 'success' && needs.crates-io.result == 'success' && needs.pypi.result == 'success'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          gh release edit "v${VERSION}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "## 🚀 Release v${VERSION} Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Release | ${{ needs.github-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| crates.io | ${{ needs.crates-io.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PyPI | ${{ needs.pypi.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Registry notes" >> "$GITHUB_STEP_SUMMARY"
          echo "- **crates.io**: Publishes \`rusty-stack\`; users install with \`cargo install rusty-stack --locked\` (required)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PyPI**: Thin Python wrapper that installs the \`rusty-stack\` crates.io binary (OIDC trusted publishing)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Windows ALPHA" >> "$GITHUB_STEP_SUMMARY"
          echo "**Windows support is in ALPHA testing. We are openly accepting testers! The easiest way to become a tester is to test on your system/hardware, and when issues are encountered, open an issue following the issue template.**" >> "$GITHUB_STEP_SUMMARY"
