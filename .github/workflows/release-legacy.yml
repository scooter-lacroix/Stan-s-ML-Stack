name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Gate: only proceed for version tags or merged "chore(deps)" PRs ──
  check-trigger:
    name: Check Release Trigger
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Determine if this should trigger a release
        id: check
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Triggered by a version tag
            tag="${{ github.ref_name }}"
            if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              version="${tag#v}"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "Triggered by tag: $tag (version: $version)"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Tag $tag does not match version pattern"
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Triggered by PR merge — only if it contains "chore(deps)" in the title or commit message
            if [[ "${{ github.event.pull_request.merged }}" != "true" ]]; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "PR was not merged, skipping"
              exit 0
            fi

            title="${{ github.event.pull_request.title }}"
            body="${{ github.event.pull_request.body }}"

            if echo "$title" | grep -qi "chore(deps)"; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "Triggered by merged deps PR: $title"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "PR '$title' does not contain 'chore(deps)', skipping"
            fi
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build release binary for linux x86_64 ──
  build:
    name: Build Release Binary
    needs: check-trigger
    if: needs.check-trigger.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rusty-stack

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rusty-stack/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rusty-stack/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Read version from Cargo.toml
        id: version
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | grep -oP '"\K[^"]+')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building version: $version"

      - name: Build release binary
        run: |
          cargo build --release --all-features 2>&1

      - name: Strip and prepare binary
        run: |
          strip --strip-all target/release/rusty-stack
          strip --strip-all target/release/rusty || true
          mkdir -p /tmp/release
          cp target/release/rusty-stack /tmp/release/rusty-stack-x86_64-unknown-linux-gnu
          cp target/release/rusty /tmp/release/rusty-x86_64-unknown-linux-gnu || true
          chmod +x /tmp/release/*

      - name: Generate checksums
        run: |
          cd /tmp/release
          sha256sum * > checksums-sha256.txt
          echo "## Checksums" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat checksums-sha256.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: /tmp/release/*
          retention-days: 7

  # ── Create GitHub release ──
  release:
    name: Create GitHub Release
    needs: [check-trigger, build]
    if: needs.check-trigger.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          cd rusty-stack
          version=$(grep '^version' Cargo.toml | head -1 | grep -oP '"\K[^"]+')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: /tmp/release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            /tmp/release/rusty-stack-x86_64-unknown-linux-gnu
            /tmp/release/rusty-x86_64-unknown-linux-gnu
            /tmp/release/checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "# Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pre-release:** ${{ contains(steps.version.outputs.version, '-') }}" >> "$GITHUB_STEP_SUMMARY"
