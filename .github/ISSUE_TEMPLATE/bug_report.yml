name: Bug Report
description: Report a bug or issue with Rusty Stack
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        > **⚠️ AI/clanker/slop issues WILL be rejected.**
        >
        > This project does not accept issues generated by AI tools without human
        > verification. You must have personally experienced and verified the bug
        > you are reporting.

        Thank you for taking the time to report a bug in Rusty Stack. Please fill
        out the form below with as much detail as possible.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Arch Linux
        - Fedora 40+
        - Other Linux
        - Windows (WSL2)
        - Windows (Native ALPHA)
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      description: Your AMD GPU model (e.g., RX 7900 XTX, RX 7800 XT)
      placeholder: "AMD Radeon RX 7900 XTX"
    validations:
      required: true

  - type: dropdown
    id: rocm-version
    attributes:
      label: ROCm Version
      options:
        - 6.4.3 (Legacy)
        - 7.1 (Stable)
        - 7.2.1 (Latest)
        - Unknown / Not installed
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which Rusty Stack component is affected?
      options:
        - Installer (TUI)
        - Installer (CLI - rusty command)
        - ROCm installation
        - PyTorch
        - Triton
        - ONNX Runtime
        - MIGraphX
        - Flash Attention
        - RCCL
        - Llama.cpp / Rusty Llama
        - DeepSpeed
        - vLLM
        - ComfyUI
        - bitsandbytes
        - Weights & Biases
        - MPI
        - Megatron-LM
        - Verification (rusty verify)
        - Benchmarks (rusty bench)
        - Update system (rusty update)
        - Telemetry
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Exact steps to reproduce the bug. Include commands you ran.
      placeholder: |
        1. Run `rusty` to launch the TUI
        2. Select ROCm component
        3. Click Install
        4. Error appears at 87% progress
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The ROCm installation should complete successfully."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or logs.
      placeholder: |
        Installation failed with error:
        ```
        Error: cmake build failed with exit code 1
        ```
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Paste any relevant log output. Logs are at `~/.mlstack/logs/rusty-stack.log`.
        You can also run with `RUSTY_LOG=debug rusty ...` for verbose output.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Any other context about the problem. Hardware configuration, environment
        variables, custom configuration, etc.
    validations:
      required: false
